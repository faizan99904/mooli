<div id="main-content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row clearfix">
                <div class="col-lg-4 col-md-12 col-sm-12">
                    <h1>Patient Invoices</h1>
                    <span>Patient billing history</span>
                </div>
                <div class="col-lg-8 col-md-12 col-sm-12 text-lg-right">
                    <a class="btn btn-default" [routerLink]="['/patients/all-patients']">Back to Patients</a>
                </div>
            </div>
        </div>

        <div class="row clearfix">
            <div class="col-sm-12">
                <div class="card">
                    <div class="body table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Bill No</th>
                                    <th>Total</th>
                                    <th>Paid</th>
                                    <th>Due</th>
                                    <th>Status</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let bill of bills">
                                    <td>{{ bill.billNo }}</td>
                                    <td>{{ bill.grandTotal }}</td>
                                    <td>{{ bill.paidAmount }}</td>
                                    <td>{{ bill.dueAmount }}</td>
                                    <td><span class="badge badge-info">{{ bill.paymentStatus }}</span></td>
                                    <td><a [routerLink]="['/payments/invoices/invoice-detail', bill._id]">View</a></td>
                                </tr>
                                <tr *ngIf="!loading && bills.length === 0">
                                    <td colspan="6" class="text-center text-muted">No invoices found</td>
                                </tr>
                                <tr *ngIf="loading">
                                    <td colspan="6" class="text-center text-muted">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
