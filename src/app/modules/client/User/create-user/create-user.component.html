<div id="main-content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row clearfix">
                <div class="col-lg-4 col-md-12 col-sm-12">
                    <h1>{{ editingUser ? 'Edit User' : 'Add User' }}</h1>
                    <span>Hospital staff account</span>
                </div>
            </div>
        </div>

        <div class="row clearfix">
            <div class="col-lg-12 col-md-12 col-sm-12">
                <div class="card">
                    <div class="body">
                        <form [formGroup]="userForm" (ngSubmit)="submitForm()">
                            <div class="row clearfix">
                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Name <span class="text-danger">*</span></label>
                                        <input class="form-control" formControlName="name" />
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Email <span class="text-danger">*</span></label>
                                        <input class="form-control" type="email" formControlName="email" />
                                    </div>
                                </div>

                                <div class="col-sm-6" *ngIf="!editingUser">
                                    <div class="form-group">
                                        <label>Password <span class="text-danger">*</span></label>
                                        <div class="input-group flex">
                                            <input class="form-control" [type]="showPassword ? 'text' : 'password'"
                                                formControlName="password" />
                                            <div class="input-group-append ico">
                                                <i (click)="togglePasswordVisibility('password')" class="fa"
                                                    [ngClass]="{'fa-eye': !showPassword, 'fa-eye-slash': showPassword}"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Phone</label>
                                        <input class="form-control" formControlName="phone" />
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Role <span class="text-danger">*</span></label>
                                        <select class="form-control" formControlName="roleId">
                                            <option value="" disabled>Select Role</option>
                                            <option *ngFor="let role of roles" [value]="role._id">{{ role.name }}</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Status</label>
                                        <select class="form-control" formControlName="status">
                                            <option value="active">Active</option>
                                            <option value="inactive">Inactive</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <label class="fancy-checkbox">
                                        <input type="checkbox" formControlName="isEmailVerified">
                                        <span>Email verified</span>
                                    </label>
                                </div>

                                <div class="col-12 mt-3">
                                    <button [disabled]="userForm.invalid || saving" type="submit"
                                        class="btn btn-primary">
                                        {{ saving ? 'Saving...' : 'Submit' }}
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
