<div id="main-content">
  <div class="container-fluid settings-page">
    <div class="block-header">
      <div class="row clearfix">
        <div class="col-xl-7 col-md-8 col-sm-12">
          <h1>Settings</h1>
          <span>Manage your personal profile and password.</span>
        </div>
      </div>
    </div>

    <div class="settings-shell">
      <aside class="settings-nav card">
        <div class="card-body">
          <button type="button" class="settings-tab" [class.active]="activeTab === 'profile'" (click)="setTab('profile')">
            Profile
          </button>
          <button type="button" class="settings-tab" [class.active]="activeTab === 'password'" (click)="setTab('password')">
            Password
          </button>
        </div>
      </aside>

      <section class="settings-content">
        <div class="card" *ngIf="activeTab === 'profile'">
          <div class="card-header">My Profile</div>
          <div class="card-body">
            <div class="row">
              <div class="col-lg-6 col-md-12">
                <div class="form-group c_form_group">
                  <label>Full Name</label>
                  <input class="form-control" type="text" [(ngModel)]="profileName" name="profileName" />
                </div>
              </div>
              <div class="col-lg-6 col-md-12">
                <div class="form-group c_form_group">
                  <label>Email</label>
                  <input class="form-control" type="email" [(ngModel)]="profileEmail" name="profileEmail" />
                </div>
              </div>
              <div class="col-lg-6 col-md-12">
                <div class="form-group c_form_group">
                  <label>Phone</label>
                  <input class="form-control" type="text" [(ngModel)]="profilePhone" name="profilePhone" />
                </div>
              </div>
              <div class="col-lg-6 col-md-12">
                <div class="profile-meta">
                  <span class="meta-label">Role</span>
                  <strong>{{ currentUser?.role?.name || role || 'User' }}</strong>
                  <span class="meta-label">Hospital</span>
                  <strong>{{ currentUser?.hospital?.name || 'Not assigned' }}</strong>
                </div>
              </div>
            </div>
            <div class="settings-actions">
              <button type="button" class="btn btn-primary theme-bg gradient" [disabled]="profileLoading || profileSaving" (click)="saveProfile()">
                {{ profileSaving ? 'Saving...' : 'Save Profile' }}
              </button>
            </div>
          </div>
        </div>

        <div class="card" *ngIf="activeTab === 'password'">
          <div class="card-header">Change Password</div>
          <div class="card-body">
            <div class="row">
              <div class="col-lg-6 col-md-12">
                <div class="form-group c_form_group">
                  <label>Current Password</label>
                  <div class="input-group flex">
                    <input [(ngModel)]="oldPassword" [type]="showCurrentPass ? 'text' : 'password'" class="form-control" name="oldPassword" />
                    <i class="fa" [ngClass]="showCurrentPass ? 'fa-eye-slash' : 'fa-eye'" (click)="toggleCurrentPass()"></i>
                  </div>
                </div>
              </div>
              <div class="col-lg-6 col-md-12">
                <div class="form-group c_form_group">
                  <label>New Password</label>
                  <div class="input-group flex">
                    <input [(ngModel)]="newPassword" [type]="showPassword ? 'text' : 'password'" class="form-control" name="newPassword" />
                    <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'" (click)="toggleNewPass()"></i>
                  </div>
                </div>
              </div>
            </div>
            <div class="settings-actions">
              <button type="button" class="btn btn-primary theme-bg gradient" [disabled]="passwordSaving" (click)="changePass()">
                {{ passwordSaving ? 'Changing...' : 'Change Password' }}
              </button>
              <button type="button" class="btn btn-default" [disabled]="passwordSaving" (click)="cancelPasswordChange()">
                Cancel
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
