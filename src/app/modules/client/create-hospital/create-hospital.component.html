<div id="main-content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row clearfix align-items-center">
                <div class="col-lg-6 col-md-12 col-sm-12">
                    <h1>{{ editingHospital ? 'Edit Hospital' : 'Add Hospital' }}</h1>
                    <span>{{ editingHospital ? 'Update hospital details' : 'Create new hospital' }}</span>
                </div>

                <div class="col-lg-6 col-md-12 col-sm-12 text-right">
                    <button type="button" class="btn btn-outline-secondary" [routerLink]="'/hospitals'">
                        <i class="fa fa-arrow-left"></i>
                        Back
                    </button>
                </div>
            </div>
        </div>

        <div class="row clearfix">
            <div class="col-lg-12 col-md-12 col-sm-12">
                <div class="card">
                    <div class="body">
                        <form [formGroup]="hospitalForm" (ngSubmit)="submitForm()">
                            <div class="row clearfix">
                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Hospital Name <span class="text-danger">*</span></label>
                                        <input class="form-control" formControlName="name"
                                            placeholder="Enter hospital name" />

                                        <small class="text-danger"
                                            *ngIf="hospitalForm.get('name')?.touched && hospitalForm.get('name')?.invalid">
                                            Hospital name is required
                                        </small>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Hospital Code <span class="text-danger">*</span></label>
                                        <input class="form-control" formControlName="code" placeholder="e.g. HOSP001" />

                                        <small class="text-danger"
                                            *ngIf="hospitalForm.get('code')?.touched && hospitalForm.get('code')?.invalid">
                                            Hospital code is required
                                        </small>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Email</label>
                                        <input class="form-control" type="email" formControlName="email"
                                            placeholder="hospital@example.com" />

                                        <small class="text-danger"
                                            *ngIf="hospitalForm.get('email')?.touched && hospitalForm.get('email')?.invalid">
                                            Enter valid email
                                        </small>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Phone</label>
                                        <input class="form-control" formControlName="phone" placeholder="03001234567" />
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>City</label>
                                        <input class="form-control" formControlName="city" placeholder="Lahore" />
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Country</label>
                                        <input class="form-control" formControlName="country" placeholder="Pakistan" />
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Subscription Plan</label>
                                        <select class="form-control" formControlName="subscriptionPlan">
                                            <option value="basic">Basic</option>
                                            <option value="standard">Standard</option>
                                            <option value="premium">Premium</option>
                                            <option value="enterprise">Enterprise</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Status <span class="text-danger">*</span></label>
                                        <select class="form-control" formControlName="status">
                                            <option value="active">Active</option>
                                            <option value="inactive">Inactive</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-sm-12">
                                    <div class="form-group">
                                        <label>Logo URL</label>
                                        <input class="form-control" formControlName="logoUrl"
                                            placeholder="https://example.com/logo.png" />
                                    </div>
                                </div>

                                <div class="col-sm-12">
                                    <div class="form-group">
                                        <label>Address</label>
                                        <textarea class="form-control" rows="4" formControlName="address"
                                            placeholder="Enter hospital address"></textarea>
                                    </div>
                                </div>

                                <div class="col-12 mt-3">
                                    <button [disabled]="hospitalForm.invalid || saving" type="submit"
                                        class="btn btn-primary">
                                        <i class="fa fa-save"></i>
                                        {{ saving ? 'Saving...' : editingHospital ? 'Update Hospital' : 'Create
                                        Hospital' }}
                                    </button>

                                    <button type="button" class="btn btn-secondary ml-2" [routerLink]="'/hospitals'">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
