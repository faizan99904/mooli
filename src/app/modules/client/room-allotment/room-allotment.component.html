<div id="main-content" class="rooms-page">
    <div class="container-fluid px-2 px-md-4">
        <!-- Page Header -->
        <div class="block-header py-3">
            <div class="row align-items-center">
                <div class="col-lg-4 col-md-12 mb-2 mb-lg-0">
                    <h1 class="page-title">Rooms</h1>
                    <span class="page-subtitle">Manage hospital rooms</span>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Add / Edit Room Form -->
            <div class="col-lg-4 col-md-12 mb-3" *ngIf="canManageRooms || editingId">
                <div class="card shadow-sm rounded">
                    <div class="header px-3 py-2 border-bottom">
                        <h2 class="h5 mb-0">{{ editingId ? 'Edit Room' : 'Add Room' }}</h2>
                    </div>
                    <div class="body p-3">
                        <form [formGroup]="roomForm" (ngSubmit)="submitRoom()">
                            <div class="form-group">
                                <label>Room No</label>
                                <input class="form-control" formControlName="roomNo" placeholder="Enter room number">
                            </div>
                            <div class="form-group">
                                <label>Room Type</label>
                                <select class="form-control" formControlName="roomType">
                                    <option *ngFor="let type of roomTypes" [value]="type">{{ type }}</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Floor</label>
                                <input class="form-control" formControlName="floor" placeholder="Floor number">
                            </div>
                            <div class="form-group">
                                <label>Charges Per Day</label>
                                <input class="form-control" type="number" formControlName="chargesPerDay"
                                    placeholder="Enter charges">
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select class="form-control" formControlName="status">
                                    <option value="available">Available</option>
                                    <option value="occupied">Occupied</option>
                                    <option value="maintenance">Maintenance</option>
                                </select>
                            </div>

                            <div class="d-flex justify-content-start mt-3">
                                <button class="btn btn-primary" [disabled]="saving" type="submit">
                                    {{ saving ? 'Saving...' : editingId ? 'Update' : 'Create' }}
                                </button>
                                <button type="button" class="btn btn-outline-secondary ml-2" *ngIf="editingId"
                                    (click)="resetForm()">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Room List Table -->
            <div class="col-lg-8 col-md-12">
                <div class="card shadow-sm rounded">
                    <div class="header px-3 py-2 border-bottom">
                        <h2 class="h5 mb-0">Room List</h2>
                    </div>
                    <div class="body p-3">
                        <!-- Filters -->
                        <div class="row mb-3">
                            <div class="col-12 col-md-4 mb-2 mb-md-0">
                                <input class="form-control" [(ngModel)]="search" placeholder="Search room">
                            </div>
                            <div class="col-6 col-md-3 mb-2 mb-md-0">
                                <select class="form-control" [(ngModel)]="roomType">
                                    <option value="">All types</option>
                                    <option *ngFor="let type of roomTypes" [value]="type">{{ type }}</option>
                                </select>
                            </div>
                            <div class="col-6 col-md-3 mb-2 mb-md-0">
                                <select class="form-control" [(ngModel)]="status">
                                    <option value="">All statuses</option>
                                    <option value="available">Available</option>
                                    <option value="occupied">Occupied</option>
                                    <option value="maintenance">Maintenance</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-2">
                                <button class="btn btn-outline-secondary btn-block"
                                    (click)="page = 1; loadRooms()">Filter</button>
                            </div>
                        </div>

                        <!-- Table -->
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0">
                                <thead class="thead-light">
                                    <tr>
                                        <th>Room</th>
                                        <th>Type</th>
                                        <th>Floor</th>
                                        <th>Charges</th>
                                        <th>Status</th>
                                        <th class="text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let room of rooms">
                                        <td>{{ room.roomNo }}</td>
                                        <td>{{ room.roomType }}</td>
                                        <td>{{ room.floor || '-' }}</td>
                                        <td>{{ room.chargesPerDay }}</td>
                                        <td>
                                            <span class="badge badge-info text-capitalize">{{ room.status }}</span>
                                        </td>
                                        <td class="text-right">
                                            <button class="btn btn-sm btn-outline-warning mr-1"
                                                *ngIf="can('rooms.update')" (click)="editRoom(room)">Edit</button>
                                            <button class="btn btn-sm btn-outline-danger" *ngIf="can('rooms.delete')"
                                                (click)="deleteRoom(room._id)">Delete</button>
                                        </td>
                                    </tr>
                                    <tr *ngIf="!loading && rooms.length === 0">
                                        <td colspan="6" class="text-center text-muted">No rooms found</td>
                                    </tr>
                                    <tr *ngIf="loading">
                                        <td colspan="6" class="text-center text-muted">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <button class="btn btn-outline-secondary" (click)="changePage(page - 1)"
                                [disabled]="page <= 1">Prev</button>
                            <span>Page {{ page }} of {{ totalPages || 1 }}</span>
                            <button class="btn btn-outline-secondary" (click)="changePage(page + 1)"
                                [disabled]="totalPages > 0 && page >= totalPages">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
