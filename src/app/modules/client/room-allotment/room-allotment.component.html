<div id="main-content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row clearfix">
                <div class="col-lg-4 col-md-12 col-sm-12">
                    <h1>Rooms</h1>
                    <span>Manage hospital rooms</span>
                </div>
            </div>
        </div>

        <div class="row clearfix">
            <div class="col-lg-4 col-md-12" *ngIf="canManageRooms || editingId">
                <div class="card">
                    <div class="header"><h2>{{ editingId ? 'Edit Room' : 'Add Room' }}</h2></div>
                    <div class="body">
                        <form [formGroup]="roomForm" (ngSubmit)="submitRoom()">
                            <div class="form-group">
                                <label>Room No</label>
                                <input class="form-control" formControlName="roomNo">
                            </div>
                            <div class="form-group">
                                <label>Room Type</label>
                                <select class="form-control" formControlName="roomType">
                                    <option *ngFor="let type of roomTypes" [value]="type">{{ type }}</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Floor</label>
                                <input class="form-control" formControlName="floor">
                            </div>
                            <div class="form-group">
                                <label>Charges Per Day</label>
                                <input class="form-control" type="number" formControlName="chargesPerDay">
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select class="form-control" formControlName="status">
                                    <option value="available">Available</option>
                                    <option value="occupied">Occupied</option>
                                    <option value="maintenance">Maintenance</option>
                                </select>
                            </div>
                            <button class="btn btn-primary" [disabled]="saving" type="submit">
                                {{ saving ? 'Saving...' : editingId ? 'Update' : 'Create' }}
                            </button>
                            <button type="button" class="btn btn-default ml-2" *ngIf="editingId" (click)="resetForm()">Cancel</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8 col-md-12">
                <div class="card">
                    <div class="header"><h2>Room List</h2></div>
                    <div class="body">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <input class="form-control" [(ngModel)]="search" placeholder="Search room">
                            </div>
                            <div class="col-md-3">
                                <select class="form-control" [(ngModel)]="roomType">
                                    <option value="">All types</option>
                                    <option *ngFor="let type of roomTypes" [value]="type">{{ type }}</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-control" [(ngModel)]="status">
                                    <option value="">All statuses</option>
                                    <option value="available">Available</option>
                                    <option value="occupied">Occupied</option>
                                    <option value="maintenance">Maintenance</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-default btn-block" (click)="page = 1; loadRooms()">Filter</button>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Room</th>
                                        <th>Type</th>
                                        <th>Floor</th>
                                        <th>Charges</th>
                                        <th>Status</th>
                                        <th class="text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let room of rooms">
                                        <td>{{ room.roomNo }}</td>
                                        <td>{{ room.roomType }}</td>
                                        <td>{{ room.floor || '-' }}</td>
                                        <td>{{ room.chargesPerDay }}</td>
                                        <td><span class="badge badge-info">{{ room.status }}</span></td>
                                        <td class="text-right">
                                            <button class="btn btn-sm btn-default mr-1" *ngIf="can('rooms.update')" (click)="editRoom(room)">Edit</button>
                                            <button class="btn btn-sm btn-danger" *ngIf="can('rooms.delete')" (click)="deleteRoom(room._id)">Delete</button>
                                        </td>
                                    </tr>
                                    <tr *ngIf="!loading && rooms.length === 0">
                                        <td colspan="6" class="text-center text-muted">No rooms found</td>
                                    </tr>
                                    <tr *ngIf="loading">
                                        <td colspan="6" class="text-center text-muted">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <button class="btn btn-default" (click)="changePage(page - 1)" [disabled]="page <= 1">Prev</button>
                            <span>Page {{ page }} of {{ totalPages || 1 }}</span>
                            <button class="btn btn-default" (click)="changePage(page + 1)"
                                [disabled]="totalPages > 0 && page >= totalPages">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
