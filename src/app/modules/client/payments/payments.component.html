<div id="main-content">
    <div class="container-fluid">
        <div class="block-header">
            <div class="row clearfix">
                <div class="col-lg-4 col-md-12 col-sm-12">
                    <h1>Payments</h1>
                    <span>Recorded payment transactions</span>
                </div>
            </div>
        </div>

        <div class="row clearfix">
            <div class="col-sm-12">
                <div class="card">
                    <div class="body">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <select class="form-control" [(ngModel)]="referenceType">
                                    <option value="">All references</option>
                                    <option value="sale">Sale</option>
                                    <option value="purchase">Purchase</option>
                                    <option value="sales_return">Sales return</option>
                                    <option value="purchase_return">Purchase return</option>
                                    <option value="expense">Expense</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select class="form-control" [(ngModel)]="method">
                                    <option value="">All methods</option>
                                    <option value="cash">Cash</option>
                                    <option value="card">Card</option>
                                    <option value="bank">Bank</option>
                                    <option value="online">Online</option>
                                    <option value="wallet">Wallet</option>
                                    <option value="check">Check</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-default btn-block" (click)="page = 1; loadPayments()">Filter</button>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Reference</th>
                                        <th>Method</th>
                                        <th>Amount</th>
                                        <th>Date</th>
                                        <th>Reference No</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let payment of payments">
                                        <td>{{ payment.referenceType }}</td>
                                        <td>{{ payment.method }}</td>
                                        <td>{{ payment.amount }}</td>
                                        <td>{{ payment.paymentDate | date:'mediumDate' }}</td>
                                        <td>{{ payment.referenceNo }}</td>
                                    </tr>
                                    <tr *ngIf="!loading && payments.length === 0">
                                        <td colspan="5" class="text-center text-muted">No payments found</td>
                                    </tr>
                                    <tr *ngIf="loading">
                                        <td colspan="5" class="text-center text-muted">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <button class="btn btn-default" (click)="changePage(page - 1)" [disabled]="page <= 1">Prev</button>
                            <span>Page {{ page }} of {{ totalPages || 1 }}</span>
                            <button class="btn btn-default" (click)="changePage(page + 1)"
                                [disabled]="totalPages > 0 && page >= totalPages">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
